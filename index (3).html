<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác minh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(-45deg, #667eea, #764ba2, #6b8cff, #9b59b6);
      background-size: 400% 400%;
      animation: gradient 12s ease infinite;
    }

    @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
      padding: 36px 32px;
      max-width: 400px;
      width: 100%;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      font-size: 1.35rem;
      color: #1a1a2e;
      margin-bottom: 10px;
    }

    .notice {
      text-align: center;
      font-size: 0.85rem;
      color: #6366f1;
      background: linear-gradient(135deg, #eef2ff, #f5f3ff);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .question {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
    }

    .question.correct {
      border-color: #22c55e;
      background: #f0fdf4;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.25);
      animation: pulse 0.6s ease;
    }

    .question.wrong {
      border-color: #ef4444;
      background: #fef2f2;
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .question-label {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.02em;
    }

    .question input {
      width: 88px;
      padding: 10px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .question input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
      transform: scale(1.05);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    button {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover { transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    .btn-check {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.35);
    }

    .btn-check:hover {
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.45);
    }

    .btn-check:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-refresh {
      background: #f1f5f9;
      color: #64748b;
    }

    .btn-refresh:hover { background: #e2e8f0; }

    .message {
      text-align: center;
      margin-top: 14px;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.88rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .message.error {
      background: #fef2f2;
      color: #dc2626;
    }

    .message.success {
      background: #f0fdf4;
      color: #16a34a;
    }

    .fade-in {
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Xác minh nhanh</h1>
    <p class="notice">Nhập đúng kết quả để được chuyển hướng</p>
    <form id="quizForm">
      <div id="questions"></div>
      <div class="btn-group">
        <button type="button" class="btn-refresh" id="btnRefresh">Đổi câu</button>
        <button type="submit" class="btn-check" id="btnCheck">Xác nhận</button>
      </div>
      <div class="message" id="message"></div>
    </form>
  </div>

  <script>
    const REDIRECT_URL = "https://www.03llwin.com/?id=171885340";

    const operators = [
      { symbol: "+", fn: (a, b) => a + b },
      { symbol: "-", fn: (a, b) => a - b },
      { symbol: "×", fn: (a, b) => a * b },
    ];

    let currentQuestion = null;

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function questionKey(q) {
      return q.a + q.symbol + q.b;
    }

    function generateQuestion(excludeKey) {
      let q;
      do {
        const op = operators[randomInt(0, operators.length - 1)];
        let a, b, answer;

        if (op.symbol === "+") {
          a = randomInt(10, 99);
          b = randomInt(10, 99);
          answer = op.fn(a, b);
        } else if (op.symbol === "-") {
          a = randomInt(20, 99);
          b = randomInt(1, a - 1);
          answer = op.fn(a, b);
        } else {
          a = randomInt(2, 12);
          b = randomInt(2, 12);
          answer = op.fn(a, b);
        }

        q = { a, b, symbol: op.symbol, answer };
      } while (excludeKey && questionKey(q) === excludeKey);

      return q;
    }

    function generateQuiz() {
      const prevKey = currentQuestion ? questionKey(currentQuestion) : null;
      currentQuestion = generateQuestion(prevKey);
      renderQuestion();
      hideMessage();
    }

    function renderQuestion() {
      const container = document.getElementById("questions");
      const q = currentQuestion;

      container.innerHTML =
        '<div class="question fade-in" id="q-0">' +
          '<span class="question-label">' + q.a + " " + q.symbol + " " + q.b + " =</span>" +
          '<input type="number" id="answer" placeholder="?" required autocomplete="off" inputmode="numeric">' +
        '</div>';

      document.getElementById("answer").focus();
    }

    function showMessage(text, type) {
      const msg = document.getElementById("message");
      msg.textContent = text;
      msg.className = "message show " + type;
    }

    function hideMessage() {
      document.getElementById("message").className = "message";
    }

    function checkAnswer() {
      const input = document.getElementById("answer");
      const div = document.getElementById("q-0");
      const userAnswer = input.value.trim();

      div.classList.remove("correct", "wrong");

      if (userAnswer === "") {
        div.classList.add("wrong");
        showMessage("Nhập số", "error");
        return;
      }

      if (parseInt(userAnswer, 10) === currentQuestion.answer) {
        div.classList.add("correct");
        showMessage("Đúng rồi! Đang chuyển hướng...", "success");
        document.getElementById("btnCheck").disabled = true;
        setTimeout(function () {
          window.location.href = REDIRECT_URL;
        }, 1200);
      } else {
        div.classList.add("wrong");
        showMessage("Sai rồi, thử câu mới!", "error");
        setTimeout(function () {
          generateQuiz();
        }, 700);
      }
    }

    document.getElementById("quizForm").addEventListener("submit", function (e) {
      e.preventDefault();
      checkAnswer();
    });

    document.getElementById("btnRefresh").addEventListener("click", function () {
      generateQuiz();
      document.getElementById("btnCheck").disabled = false;
    });

    generateQuiz();
  </script>
</body>
</html>
